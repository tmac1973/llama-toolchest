services:
  llamactl:
    build:
      context: .
      dockerfile: Dockerfile.cpu
    container_name: llamactl
    ports:
      - "${LLAMACTL_PORT:-3000}:3000"   # LlamaCtl management UI
      - "8080-8099:8080-8099"           # llama-server instances (chat UI + inference)
    volumes:
      - llamactl-data:/data:z
    env_file:
      - path: .env
        required: false
    restart: unless-stopped

volumes:
  llamactl-data:
    driver: local
