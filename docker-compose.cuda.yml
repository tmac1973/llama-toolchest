services:
  llamactl:
    build:
      context: .
      dockerfile: Dockerfile.cuda
    container_name: llamactl
    ports:
      - "${LLAMACTL_PORT:-3000}:3000"   # LlamaCtl management UI
      - "${LLAMACTL_INFERENCE_PORT:-8080}:8080"   # llama-server inference + chat UI
    volumes:
      - llamactl-data:/data:z
    env_file:
      - path: .env
        required: false
    # Docker uses deploy.resources for GPU access
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # Podman uses CDI device strings (ignored by Docker)
    devices:
      - nvidia.com/gpu=all
    restart: unless-stopped

volumes:
  llamactl-data:
    driver: local
