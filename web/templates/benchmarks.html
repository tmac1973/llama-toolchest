{{define "content"}}
<div id="benchmark-form"
     hx-get="/api/benchmarks/form"
     hx-trigger="load"
     hx-swap="innerHTML">
</div>

<div id="benchmark-progress"></div>

<article>
    <header>
        <div style="display:flex;justify-content:space-between;align-items:center;">
            <span>Benchmark Results</span>
            <button type="button" class="outline secondary"
                    style="margin:0;padding:0.2rem 0.6rem;font-size:0.8rem;"
                    onclick="var checks=document.querySelectorAll('.bench-check:checked');if(checks.length<2){alert('Select at least 2 benchmarks to compare');return;}var ids=Array.from(checks).map(c=>c.value).join(',');htmx.ajax('GET','/api/benchmarks/compare?ids='+ids,{target:'#comparison-view',swap:'innerHTML'});">
                Compare Selected
            </button>
        </div>
    </header>
    <div id="comparison-view"></div>
    <div id="benchmark-list"
         hx-get="/api/benchmarks"
         hx-trigger="load, benchmarkChanged from:body"
         hx-swap="innerHTML">
        Loading...
    </div>
</article>

<article>
    <header>Live Performance</header>
    <div id="timings-summary"
         hx-get="/api/timings"
         hx-trigger="load, every 10s"
         hx-swap="innerHTML">
    </div>
</article>
{{end}}
