{{define "content"}}
<div style="display: flex; justify-content: flex-end; padding: 0 0.25rem 0.5rem 0;">
    <button type="button" class="outline secondary"
            style="margin: 0; padding: 0.2rem 0.6rem; font-size: 0.8rem;"
            hx-post="/api/models/scan"
            hx-target="#model-list"
            hx-swap="innerHTML"
            title="Scan the models directory for GGUF files not yet in the registry">
        Scan for Models
    </button>
</div>

<div id="active-downloads"
     hx-get="/api/hf/downloads"
     hx-trigger="load, every 3s"
     hx-swap="innerHTML"
     hx-on::before-swap="if(event.detail.xhr.responseText===this.innerHTML){event.detail.shouldSwap=false;}">
</div>

<div id="model-list" hx-get="/api/models" hx-trigger="load" hx-swap="innerHTML">
    Loading...
</div>

<script>
(function() {
    // --- VRAM estimate update from config save ---
    document.body.addEventListener('vramUpdated', function(e) {
        var detail = e.detail;
        if (detail && detail.id && detail.vram) {
            var cell = document.getElementById('vram-' + detail.id);
            if (cell) cell.textContent = detail.vram;
        }
    });
})();
</script>
{{end}}
