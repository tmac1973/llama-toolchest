{{define "monitor_bar"}}
<div style="display:flex;flex-direction:column;gap:0.4rem;">
    {{range .GPUs}}
    <div title="{{.Name}}">
        <div style="display:flex;justify-content:space-between;"><span>GPU{{.Index}}</span><span>{{.UtilPercent}}%</span></div>
        <progress value="{{.UtilPercent}}" max="100" style="width:100%;height:6px;margin:0;"></progress>
        <div style="display:flex;justify-content:space-between;"><span>VRAM</span><span>{{.VRAMGB}}</span></div>
        <progress value="{{.VRAMPercent}}" max="100" style="width:100%;height:6px;margin:0;"></progress>
        <div style="opacity:0.7;">{{.Details}}</div>
    </div>
    {{end}}
    <div>
        <div style="display:flex;justify-content:space-between;"><span>CPU</span><span>{{printf "%.0f" .CPUPercent}}%</span></div>
        <progress value="{{printf "%.0f" .CPUPercent}}" max="100" style="width:100%;height:6px;margin:0;"></progress>
    </div>
    <div>
        <div style="display:flex;justify-content:space-between;"><span>RAM</span><span>{{.RAMGB}}</span></div>
        <progress value="{{.RAMPercent}}" max="100" style="width:100%;height:6px;margin:0;"></progress>
    </div>
</div>
{{end}}
